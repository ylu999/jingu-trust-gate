<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Jingu Explorer</title>
  <style>
    body { font-family: monospace; padding: 20px; max-width: 900px; margin: auto; background: #0d0d0d; color: #e0e0e0; }
    h1 { color: #7ec8e3; }
    h2 { color: #aaa; margin-top: 30px; }
    .run { cursor: pointer; padding: 8px 12px; margin: 4px 0; border: 1px solid #333; border-radius: 4px; }
    .run:hover { background: #1a1a1a; }
    .ACCEPTED { border-left: 4px solid #4caf50; }
    .ESCALATED { border-left: 4px solid #f44336; }
    .RUNNING, .RETRYING { border-left: 4px solid #ff9800; }
    .step { margin: 8px 0 8px 20px; padding: 10px; background: #1a1a1a; border-radius: 4px; }
    .accept { color: #4caf50; }
    .reject, .escalate { color: #f44336; }
    .retry { color: #ff9800; }
    pre { white-space: pre-wrap; word-break: break-all; font-size: 12px; color: #aaa; margin: 4px 0; }
    #details { margin-top: 20px; }
  </style>
</head>
<body>
  <h1>Jingu Explorer</h1>
  <h2>Runs</h2>
  <div id="runs"><em>Loading...</em></div>
  <div id="details"></div>
  <script src="app.js"></script>
</body>
</html>
